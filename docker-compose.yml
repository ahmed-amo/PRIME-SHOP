version: '3.9'

services:
  app:
    build:
      context: .
      target: production
    container_name: primeshop_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-primeshop}
      DB_USERNAME: ${DB_USERNAME:-primeshop}
      DB_PASSWORD: ${DB_PASSWORD:-zmartcs123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      REDIS_PASSWORD: "null"
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: primeshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-primeshop}
      POSTGRES_USER: ${DB_USERNAME:-primeshop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zmartcs123}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-primeshop} -d ${DB_DATABASE:-primeshop}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: primeshop_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db_data:
  redis_data: