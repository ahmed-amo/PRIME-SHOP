worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;

    fastcgi_buffer_size 128k;
    fastcgi_buffers 4 256k;
    fastcgi_busy_buffers_size 256k;

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Vite-built assets — tell browser to cache them for 1 year
        # Safe because Vite adds a content hash to every filename
        location /build {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Everything else goes to Laravel's index.php
        # This is what makes /products/1 work instead of 404
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Hand .php files to PHP-FPM on port 9000
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param HTTPS on;
            fastcgi_param HTTP_X_FORWARDED_PROTO https;
            fastcgi_param HTTP_X_FORWARDED_FOR $remote_addr;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        # Block access to hidden files like .env .git
        location ~ /\. {
            deny all;
        }
    }
}
